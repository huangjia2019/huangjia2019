<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-labelledby="title desc">
  <title id="title">Jia Huang, agent architecture and pattern language</title>
  <desc id="desc">A restrained profile banner with a six by seven agent design-pattern coordinate system.</desc>
  <rect width="1600" height="480" fill="#f8fafc"/>
  <rect x="22" y="22" width="1556" height="436" rx="8" fill="none" stroke="#cbd5e1" stroke-width="2"/>
